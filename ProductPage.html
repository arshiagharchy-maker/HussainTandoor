<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Hussain Tandoor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/Root.css">
    <link rel="stylesheet" href="CSS/ProductPage.css">
    <link rel="stylesheet" href="CSS/Team.css">
</head>
<body>
    <div class="top-bar">
        <a href="index.html#products" class="back-btn">← Back</a>
            <div class="logo">
                <img src="Images/logo.png" alt="Hussain Tandoor Logo">
            </div>
        </div>
    </div>
    
    <main class="product-page">
        <div class="product-container">
            <div class="product-image-section">
                <div class="gallery">
                </div>
                <div class="product-image-wrapper">
                    <img src="https://placehold.co/600x600/f0f0f0/666666?text=PlaceHolder" alt="Professional Placeholder" class="main-product-image">
                </div>
            </div>
            
            <div class="product-details-section">
                <div class="product-info">
                    <h1 class="product-title">Professional Placeholder</h1>
                    
                    <div class="product-features">
                        <ul class="features-list">
                            <li>Good holders</li>
                            <li>Can hold many places</li>
                        </ul>
                    </div>
                    
                    <div class="product-actions">
                         <a href="ProductPage.html#team" class="inquire-btn">Inquire</a>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <section id="team" class="team-section">
        <H1 id="team-header">Contact us!</H1>
        <div class="container">
            <div id="contact" class="team-grid">
                <div class="team-card">
                    <div class="team-divider"></div>
                    <div class="team-content">
                        <h3 class="team-name">Hussain</h3>
                        <p class="team-number">+60 18-398 9844</p>
                        <button class="send-message-btn">MESSAGE ON WHATSAPP</button>
                    </div>
                </div>

                <div class="team-card">
                    <div class="team-divider"></div>
                    <div class="team-content">
                        <h3 class="team-name">Malik</h3>
                        <p class="team-number">+60 18-267 2148</p>
                        <button class="send-message-btn">MESSAGE ON WHATSAPP</button>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <script src="JS/navbar.js"></script>
    <script src="JS/ProductPage.js"></script>
    <script src="JS/Whatsapp.js"></script>
</body>
</html>
